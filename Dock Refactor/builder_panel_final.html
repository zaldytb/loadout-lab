      <!-- ═══════════════════════════════════════════
           BUILDER PANEL — Digicraft Brutalism
           Pure Tailwind, zero rounded corners
      ═══════════════════════════════════════════ -->
      <div class="builder-panel flex flex-col gap-4 min-w-0" id="builder-panel">

        <!-- Collapse toggle (desktop) -->
        <div class="flex justify-end">
          <button
            class="w-7 h-7 flex items-center justify-center border border-dc-border bg-transparent text-dc-storm hover:text-dc-platinum hover:border-dc-border-hover transition-colors"
            onclick="toggleDockCollapse()"
            title="Collapse dock"
          >
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="8 2 4 6 8 10"/></svg>
          </button>
        </div>

        <!-- ── ACTIVE LOADOUT ── -->
        <div id="dock-active-loadout">

          <!-- Empty state -->
          <div id="dock-lo-empty" class="border border-dc-border px-4 py-6 text-center">
            <p class="font-sans text-[13px] font-semibold text-dc-platinum mb-1">No active loadout</p>
            <p class="font-mono text-[9px] uppercase tracking-[0.2em] text-dc-storm">Search a racket or take the quiz</p>
          </div>

          <!-- Active state -->
          <div id="dock-lo-active" class="hidden border border-dc-border">

            <!-- OBS + info row -->
            <div class="flex gap-3 p-4 border-b border-dc-border">
              <div class="w-14 h-14 shrink-0 border border-dc-accent flex flex-col items-center justify-center" id="dock-lo-obs-ring">
                <span class="font-mono text-[18px] font-bold leading-none" id="dock-lo-obs-val">—</span>
              </div>
              <div class="flex-1 min-w-0 flex flex-col justify-center gap-0.5">
                <div class="font-sans text-[13px] font-semibold text-dc-platinum leading-tight truncate" id="dock-lo-name">—</div>
                <div class="font-mono text-[10px] text-dc-storm truncate" id="dock-lo-identity">—</div>
                <div class="font-mono text-[10px] text-dc-storm truncate" id="dock-lo-details">—</div>
                <div class="font-mono text-[9px] uppercase tracking-widest text-dc-storm mt-0.5 hidden" id="dock-lo-source"></div>
              </div>
            </div>

            <!-- Actions -->
            <div class="grid grid-cols-3">
              <button class="flex items-center justify-center gap-1.5 py-2.5 font-mono text-[9px] uppercase tracking-[0.15em] text-dc-storm hover:text-dc-platinum hover:bg-dc-void-lift transition-colors border-r border-dc-border" onclick="saveActiveLoadout()" title="Save to My Loadouts">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 13H3a1 1 0 01-1-1V2a1 1 0 011-1h5.5L12 4.5V12a1 1 0 01-1 1z"/><polyline points="8.5 1 8.5 5 12 5"/></svg>
                Save
              </button>
              <button class="flex items-center justify-center gap-1.5 py-2.5 font-mono text-[9px] uppercase tracking-[0.15em] text-dc-storm hover:text-dc-platinum hover:bg-dc-void-lift transition-colors border-r border-dc-border" onclick="shareActiveLoadout()" title="Copy share link">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 9l4-4M9 5v3.5M9 5H5.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="1" width="12" height="12" rx="2.5"/></svg>
                Share
              </button>
              <button class="flex items-center justify-center gap-1.5 py-2.5 font-mono text-[9px] uppercase tracking-[0.15em] text-dc-storm hover:text-dc-platinum hover:bg-dc-void-lift transition-colors" onclick="resetActiveLoadout()" title="Clear active loadout">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 1 4 1 4 4"/><path d="M3.5 1.5A6 6 0 1 1 1.5 8"/></svg>
                Reset
              </button>
            </div>

          </div>
        </div>

        <!-- ── CONTEXT PANEL (mode-specific, rendered by JS) ── -->
        <div id="dock-context-panel" class="dock-context-panel"></div>

        <!-- ── MY LOADOUTS ── -->
        <div id="dock-my-loadouts">
          <div class="flex items-center justify-between mb-2">
            <span class="font-mono text-[9px] font-bold tracking-[0.25em] uppercase text-dc-storm flex items-center gap-1.5">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              My Loadouts
            </span>
            <span class="font-mono text-[9px] font-bold text-dc-storm border border-dc-border px-1.5 py-0.5" id="dock-myl-count">0</span>
          </div>

          <!-- List — rows rendered by renderMyLoadouts() JS -->
          <div class="flex flex-col border border-dc-border" id="dock-myl-list">
            <div class="px-3 py-4 text-center font-mono text-[10px] text-dc-storm">No saved loadouts yet</div>
          </div>

          <!-- Export / Import footer -->
          <div class="flex border border-t-0 border-dc-border">
            <button class="flex-1 flex items-center justify-center gap-1.5 py-2 font-mono text-[9px] uppercase tracking-[0.12em] text-dc-storm hover:text-dc-platinum hover:bg-dc-void-lift transition-colors border-r border-dc-border" onclick="exportLoadouts()">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2v6M3.5 5.5L6 8l2.5-2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 9v1.5h8V9" stroke-linecap="round"/></svg>
              Export
            </button>
            <label class="flex-1 flex items-center justify-center gap-1.5 py-2 font-mono text-[9px] uppercase tracking-[0.12em] text-dc-storm hover:text-dc-platinum hover:bg-dc-void-lift transition-colors cursor-pointer">
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8V2M3.5 4.5L6 2l2.5 2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 9v1.5h8V9" stroke-linecap="round"/></svg>
              Import
              <input type="file" accept=".json" onchange="importLoadouts(event)" class="hidden">
            </label>
          </div>
        </div>

        <!-- ── CREATE FLOW AREA (rendered by JS) ── -->
        <div id="dock-create-area"></div>

        <!-- ── EDIT ACTIVE LOADOUT (collapsible, JS relocates into context panel) ── -->
        <details class="dock-editor-details" id="dock-editor-section">
          <summary class="dock-editor-summary">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.5 1.5l2 2-7.5 7.5H3v-2L10.5 1.5z"/></svg>
            Edit Active Loadout
          </summary>
          <div class="dock-editor-body">

            <!-- Frame -->
            <div class="flex flex-col gap-2 mb-4">
              <span class="font-mono text-[9px] font-bold tracking-[0.25em] uppercase text-dc-storm flex items-center gap-1.5">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="5" x2="8" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.5"/></svg>
                Frame
              </span>
              <div id="select-racquet"></div>
              <div id="frame-specs" class="hidden flex flex-col border border-dc-border bg-dc-void-deep px-3 py-2"></div>
            </div>

            <!-- String Setup -->
            <div class="flex flex-col gap-2">
              <span class="font-mono text-[9px] font-bold tracking-[0.25em] uppercase text-dc-storm flex items-center gap-1.5">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="4" x2="5" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="4" x2="11" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>
                String Setup
              </span>

              <!-- Full / Hybrid toggle -->
              <div class="flex border border-dc-border">
                <button class="flex-1 py-2 font-mono text-[10px] font-bold uppercase tracking-[0.12em] bg-dc-platinum text-dc-void border-r border-dc-border transition-colors" data-mode="full" id="btn-full">Full Bed</button>
                <button class="flex-1 py-2 font-mono text-[10px] font-bold uppercase tracking-[0.12em] bg-transparent text-dc-storm hover:text-dc-platinum transition-colors" data-mode="hybrid" id="btn-hybrid">Hybrid</button>
              </div>

              <!-- Full Bed config -->
              <div id="full-bed-config" class="flex flex-col gap-2 pt-1">
                <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.2em]">String</span>
                <div id="select-string-full" data-gauge-target="gauge-select-full"></div>
                <div class="flex flex-col gap-1">
                  <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Gauge</span>
                  <select id="gauge-select-full" class="gauge-select" disabled><option value="">—</option></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                  <div class="flex flex-col gap-1">
                    <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Mains lbs</span>
                    <input type="number" id="input-tension-full-mains" class="text-input" min="30" max="70" value="55">
                  </div>
                  <div class="flex flex-col gap-1">
                    <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Crosses lbs</span>
                    <input type="number" id="input-tension-full-crosses" class="text-input" min="30" max="70" value="53">
                  </div>
                </div>
              </div>

              <!-- Hybrid config -->
              <div id="hybrid-config" class="hidden flex flex-col gap-3 pt-1">
                <div class="flex flex-col gap-2 pl-2 border-l-2 border-dc-storm/30">
                  <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.2em]">Mains</span>
                  <div id="select-string-mains" data-placeholder="Select Main String..." data-gauge-target="gauge-select-mains"></div>
                  <div class="grid grid-cols-2 gap-2">
                    <div class="flex flex-col gap-1">
                      <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Gauge</span>
                      <select id="gauge-select-mains" class="gauge-select" disabled><option value="">—</option></select>
                    </div>
                    <div class="flex flex-col gap-1">
                      <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Tension</span>
                      <input type="number" id="input-tension-mains" class="text-input" min="30" max="70" value="55">
                    </div>
                  </div>
                </div>
                <div class="flex flex-col gap-2 pl-2 border-l-2 border-dc-storm/20">
                  <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.2em]">Crosses</span>
                  <div id="select-string-crosses" data-placeholder="Select Cross String..." data-gauge-target="gauge-select-crosses"></div>
                  <div class="grid grid-cols-2 gap-2">
                    <div class="flex flex-col gap-1">
                      <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Gauge</span>
                      <select id="gauge-select-crosses" class="gauge-select" disabled><option value="">—</option></select>
                    </div>
                    <div class="flex flex-col gap-1">
                      <span class="font-mono text-[9px] text-dc-storm uppercase tracking-[0.15em]">Tension</span>
                      <input type="number" id="input-tension-crosses" class="text-input" min="30" max="70" value="53">
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </details>

      </div>
